<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大專資源教室 - 學習輔具線上清單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-[#F9F6F0] text-gray-800 font-sans m-0 p-0">

    <div id="app" class="min-h-screen flex flex-col">
        <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="text-center sm:text-left">
                    <h1 class="text-xl font-bold tracking-widest text-[#2C4A3E] uppercase">Resource Classroom Learning Aid Resource Network</h1>
                    <p class="text-xs text-gray-400 tracking-wider mt-0.5">資源教室學習輔具資源網</p>
                </div>
                <div class="w-full sm:w-72">
                    <input type="text" v-model="searchQuery" placeholder="搜尋輔具名稱或關鍵字..." 
                           class="w-full px-4 py-2 rounded-full bg-gray-100 text-sm border-0 focus:ring-2 focus:ring-[#2C4A3E] focus:bg-white transition-all">
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-8">
            <div class="flex flex-wrap justify-center gap-2 mb-8">
                <button v-for="cat in categories" :key="cat" @click="currentCategory = cat"
                        :class="currentCategory === cat ? 'bg-[#2C4A3E] text-white' : 'bg-white text-gray-600 hover:bg-gray-50'"
                        class="px-4 py-1.5 rounded-full text-xs font-medium transition-all shadow-sm border border-gray-100">
                    {{ cat === '全部' ? 'ALL. 全部輔具' : cat }}
                </button>
            </div>

            <div v-if="loading" class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-gray-300 border-t-[#2C4A3E] mb-4"></div>
                <p class="text-sm text-gray-500 tracking-widest">正在即時計算最新庫存中...</p>
            </div>

            <div v-else-if="filteredEquipments.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <div v-for="item in filteredEquipments" :key="item.輔具編號" 
                     class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all border border-gray-100 flex flex-col group">
                    <div class="relative aspect-[4/3] bg-gray-100 overflow-hidden">
                        <img :src="item.輔具照片 || 'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=500'" 
                             :alt="item.輔具名稱" class="w-full h-full object-cover group-hover:scale-103 transition-transform duration-500">
                        <span :class="getStatusClass(getRemainingStock(item))" class="absolute top-3 right-3 text-[10px] px-2.5 py-1 rounded-full font-bold shadow-sm transition-colors">
                            {{ getRemainingStock(item) > 0 ? '可借用' : '已全數借出' }}
                        </span>
                    </div>
                    <div class="p-5 flex-1 flex flex-col justify-between">
                        <div>
                            <span class="text-[10px] text-gray-400 font-bold tracking-widest block mb-1 uppercase">{{ item.分類 }}</span>
                            <h3 class="text-base font-bold text-gray-900 mb-2 line-clamp-1 group-hover:text-[#2C4A3E] transition-colors">{{ item.輔具名稱 }}</h3>
                            <p class="text-xs text-gray-500 line-clamp-2 mb-4 leading-relaxed min-h-[2rem]">{{ item.功能簡介 }}</p>
                        </div>
                        <div class="pt-4 border-t border-gray-100 flex justify-between items-center text-xs text-gray-400">
                            <span>位置：{{ item.保管位置 }}</span>
                            <button @click="openModal(item)" class="text-[#2C4A3E] font-semibold hover:underline flex items-center gap-1">
                                查看詳情 ➔
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div v-else class="text-center py-20 bg-white rounded-2xl border border-gray-100 shadow-sm">
                <p class="text-sm text-gray-400">找不到符合條件的輔具資料</p>
            </div>
        </main>

        <div v-if="selectedItem" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm" @click.self="selectedItem = null">
            <div class="bg-white rounded-3xl max-w-lg w-full max-h-[90vh] overflow-y-auto shadow-2xl relative">
                <button @click="selectedItem = null" class="absolute top-4 right-4 bg-white/80 hover:bg-white text-gray-700
